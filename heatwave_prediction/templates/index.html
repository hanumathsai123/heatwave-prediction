<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌡️ HeatSense - Heat Wave Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 50%, #c92a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #c92a2a;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.high {
            background: #ffe0e0;
            border-left: 5px solid #c92a2a;
        }

        .result.medium {
            background: #fff4e0;
            border-left: 5px solid #f59f00;
        }

        .result.low {
            background: #e0ffe0;
            border-left: 5px solid #51cf66;
        }

        .risk-level {
            font-size: 2em;
            font-weight: bold;
            margin: 15px 0;
        }

        .probability {
            font-size: 1.2em;
            color: #666;
            margin: 10px 0;
        }

        .precautions {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
        }

        .precautions h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .precautions ul {
            list-style: none;
            padding-left: 0;
        }

        .precautions li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #555;
            line-height: 1.5;
        }

        .precautions li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #51cf66;
            font-weight: bold;
            font-size: 1.2em;
        }

        .error {
            background: #ffe0e0;
            border-left: 5px solid #c92a2a;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff6b6b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            input, button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌡️ HeatSense</h1>
            <p>Heat Wave Prediction System</p>
        </div>

        <form id="predictionForm">
            <div class="form-group">
                <label for="temperature">Temperature (°C)</label>
                <input type="number" id="temperature" placeholder="e.g., 35" min="15" max="55" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="humidity">Humidity (%)</label>
                <input type="number" id="humidity" placeholder="e.g., 65" min="5" max="100" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="wind_speed">Wind Speed (km/h)</label>
                <input type="number" id="wind_speed" placeholder="e.g., 15" min="0" max="60" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="pressure">Pressure (hPa)</label>
                <input type="number" id="pressure" placeholder="e.g., 1013" min="990" max="1035" step="0.1" required>
            </div>

            <button type="submit">🔍 Predict</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing weather data...</p>
        </div>

        <div class="result" id="result"></div>
        <div class="error" id="error" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const temperature = parseFloat(document.getElementById('temperature').value);
            const humidity = parseFloat(document.getElementById('humidity').value);
            const wind_speed = parseFloat(document.getElementById('wind_speed').value);
            const pressure = parseFloat(document.getElementById('pressure').value);

            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');

            loading.classList.add('show');
            result.classList.remove('show');
            error.style.display = 'none';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        temperature,
                        humidity,
                        wind_speed,
                        pressure
                    })
                });

                const data = await response.json();

                loading.classList.remove('show');

                if (!response.ok) {
                    throw new Error(data.error || 'Prediction failed');
                }

                const riskClass = data.risk_level.toLowerCase();
                const emoji = data.heat_wave ? '⚠️' : '✅';

                let resultHTML = `
                    <div class="${riskClass}">
                        <div class="risk-level">${emoji} ${data.risk_level} RISK</div>
                        <div class="probability">Probability: ${data.probability}%</div>
                        <div class="probability">${data.heat_wave ? '🌡️ Heat Wave Detected' : '😊 No Heat Wave'}</div>
                `;

                if (data.precautions && data.precautions.length > 0) {
                    resultHTML += `
                        <div class="precautions">
                            <h3>Safety Recommendations:</h3>
                            <ul>
                                ${data.precautions.map(p => `<li>${p}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }

                resultHTML += `</div>`;
                result.innerHTML = resultHTML;
                result.classList.add('show');

            } catch (err) {
                loading.classList.remove('show');
                error.textContent = `❌ Error: ${err.message}`;
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
